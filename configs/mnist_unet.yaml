inherits: base.yaml

dataset:
  name: mnist
  image_size: 28
  channels: 1
  num_classes: null
  conditional: false

model:
  architecture: unet
  in_channels: 1
  out_channels: 1
  fchannels: [64, 128, 256]
  residual: true
  embedding_injection: every_block
  downsample: maxpool
  upsample: transpose_conv
  skip_connection: concat
  padding: zeros